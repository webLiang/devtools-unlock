<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>disable-devtool · script manual</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        background: #fef3c7;
        color: #92400e;
        font-size: 0.85rem;
      }
      #log {
        font-size: 0.9rem;
        background: #f8fafc;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        min-height: 2rem;
      }
    </style>
  </head>
  <body>
    <p><span class="badge">CDN · manual DisableDevtool()</span></p>
    <h1>Script manual config (docs 3.4 / 1.3.1)</h1>
    <p>
      On hit, <code>alert</code> shows the detector type for Unlock matrix A–T
      checks.
    </p>
    <p><a href="/">← Back to npm demo home</a></p>
    <hr />
    <p id="unlock">Unlock: …</p>
    <div id="log">Waiting for ondevtoolopen…</div>

    <script src="https://cdn.jsdelivr.net/npm/disable-devtool@0.3.9"></script>
    <script>
      const labels = {
        '-1': 'Unknown',
        0: 'RegToString',
        1: 'DefineId',
        2: 'Size',
        3: 'DateToString',
        4: 'FuncToString',
        5: 'Debugger',
        6: 'Performance',
        7: 'DebugLib',
      };

      DisableDevtool({
        interval: 200,
        disableMenu: false,
        clearLog: true,
        rewriteHTML: ' ',
        ondevtoolopen: function (type, next) {
          var info =
            'devtool opened! type=' + type + ' (' + (labels[type] || '?') + ')';
          document.getElementById('log').textContent =
            new Date().toLocaleTimeString() + ' — ' + info;
          console.warn('[script-manual]', info);
          alert(info);
          next();
        },
      });

      function tick() {
        document.getElementById('unlock').textContent =
          'Unlock __devtoolsUnlockInstalled: ' +
          (window.__devtoolsUnlockInstalled === true ? 'Yes' : 'No');
      }
      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTools Unlock</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a1a;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px;
        color: #666;
        font-size: 12px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
      }
      input[type='checkbox'] {
        width: 16px;
        height: 16px;
        accent-color: #1a73e8;
      }
      .hint {
        margin-top: 12px;
        padding: 8px 10px;
        background: #eef3fc;
        border-radius: 6px;
        font-size: 11px;
        color: #3c4043;
      }
      .site {
        margin: 0 0 10px;
        padding: 8px 10px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 12px;
        color: #3c4043;
        word-break: break-all;
      }
      .site.unsupported {
        color: #d93025;
      }
      label.disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #188038;
      }
      .status.off {
        color: #d93025;
      }
    </style>
  </head>
  <body>
    <h1>__MSG_extName__</h1>
    <p id="subtitle">__MSG_popupSubtitle__</p>
    <div id="site" class="site">__MSG_popupLoading__</div>
    <label>
      <input id="toggle" type="checkbox" />
      <span id="toggleLabel">__MSG_popupToggleLabel__</span>
    </label>
    <div id="status" class="status">__MSG_popupLoading__</div>
    <div id="hint" class="hint">__MSG_popupHint__</div>
    <script src="popup.js"></script>
  </body>
</html>
